<!DOCTYPE html>

<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Cofrinho Digital</title>
    <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/cadastro.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>

  <body>
    <div
      class="container login-page d-flex justify-content-center align-items-center"
    >
      <div class="col-12 col-sm-10 col-md-7 col-lg-5">
        <div class="login-card">
          <div class="text-center">
            <div class="login-icon">
              <i class="fa fa-user-plus"></i>
            </div>
            <h2 class="login-title">Criar conta</h2>
            <p class="login-subtitle">
              Cadastre-se para começar a organizar suas finanças.
            </p>
          </div>
          <form id="cadastroForm">
            <div class="form-group">
              <label for="nome"> Nome completo </label>
              <input
                id="nome"
                type="text"
                class="form-control"
                placeholder="Seu nome"
                required
              />
            </div>
            <div class="form-group">
              <label for="email"> E-mail </label>
              <input
                id="email"
                type="email"
                class="form-control"
                placeholder="seu@email.com"
                required
              />
            </div>
            <div class="form-group">
              <label for="senha"> Senha </label>
              <input
                id="senha"
                type="password"
                class="form-control"
                placeholder="••••••••"
                required
              />
            </div>
            <div class="form-group">
              <label for="confirmarSenha"> Confirmar senha </label>
              <input
                id="confirmarSenha"
                type="password"
                class="form-control"
                placeholder="••••••••"
                required
              />
            </div>
            <button type="submit" class="btn btn-login">Cadastrar</button>
          </form>
          <div class="login-links">
            <a href="login.html"> Já tenho conta </a>
          </div>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("cadastroForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();
          const nome = document.getElementById("nome").value;
          const email = document.getElementById("email").value;
          const senha = document.getElementById("senha").value;
          const confirmarSenha =
            document.getElementById("confirmarSenha").value;
          if (senha !== confirmarSenha) {
            alert("As senhas não coincidem!");
            return;
          }

          try {
            const resposta = await fetch(
              "http://54.163.99.76:8000/auth/registro",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  nome: nome,
                  email: email,
                  senha: senha,
                }),
              }
            );

            const resultado = await resposta.json();
            if (resposta.status === 201) {
              localStorage.setItem("usuario_nome", nome);

              alert("Usuário cadastrado com sucesso!");
              window.location.href = "login.html";
            } else {
              alert(resultado.detail || "Erro ao cadastrar usuário.");
            }
          } catch (erro) {
            alert("Não foi possível conectar ao servidor.");
            console.error(erro);
          }
        });
    </script>
  </body>
</html>
