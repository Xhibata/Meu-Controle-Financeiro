<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Cadastro | Cofrinho Digital</title>
    <link rel="shortcut icon" href="Meu-Controle-Financeiro/Front-End/assets/vault.ico" type="image/x-icon" />

    <link rel="stylesheet" href="Meu-Controle-Financeiro/Front-End/css/global.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="cadastro.css" />
  </head>

  <body>
    <div class="login-page">
      <div class="container h-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
          <div class="col-12 col-sm-10 col-md-8 col-lg-6">
            <div class="login-card">
              <div class="text-center mb-4">
                <div class="login-icon">
                  <i class="fa fa-user-plus"></i>
                </div>
                <h2 class="login-title">Criar conta</h2>
                <p class="login-subtitle">Cadastre-se para começar a organizar suas finanças.</p>
              </div>

              <form id="cadastroForm" novalidate>
                <div class="form-group">
                  <label for="nome">Nome completo</label>
                  <input id="nome" type="text" class="form-control" placeholder="Seu nome" required />
                </div>

                <div class="form-group">
                  <label for="email">E-mail</label>
                  <input id="email" type="email" class="form-control" placeholder="seu@email.com" required />
                </div>

                <div class="form-row">
                  <div class="form-group col-md-6">
                    <label for="senha">Senha</label>
                    <input id="senha" type="password" class="form-control" placeholder="••••••••" required />
                  </div>

                  <div class="form-group col-md-6">
                    <label for="confirmarSenha">Confirmar senha</label>
                    <input id="confirmarSenha" type="password" class="form-control" placeholder="••••••••" required />
                  </div>
                </div>

                <div class="form-group form-check">
                  <input type="checkbox" class="form-check-input" id="termos" required />
                  <label class="form-check-label" for="termos">Aceito os termos e condições</label>
                </div>

                <button type="submit" class="btn btn-login btn-block">Cadastrar</button>
              </form>

              <div class="login-links">
                <a href="Meu-Controle-Financeiro/Front-End/login.html">Já tenho conta</a>
                <a href="Meu-Controle-Financeiro/Front-End/index.html">Voltar ao início</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="cadastro.js"></script>
  </body>
</html>
