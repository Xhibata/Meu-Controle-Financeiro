<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login | Cofrinho Digital</title>

    <link rel="shortcut icon" href="assets/vault.ico" />

    <link rel="stylesheet" href="css/main.css" />

    <link rel="stylesheet" href="css/auth.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-banner">
        <div class="auth-logo">
          <i class="bi bi-wallet2"></i>

          Cofrinho Digital
        </div>

        <h1 class="auth-title">Organize sua vida financeira.</h1>

        <p class="auth-text">
          Controle receitas, despesas e acompanhe seu saldo em uma interface
          simples e moderna.
        </p>

        <div class="auth-image">
          <i
            class="bi bi-graph-up-arrow"
            style="font-size: 220px; opacity: 0.15"
          ></i>
        </div>
      </div>

      <div class="auth-form">
        <div class="auth-card">
          <h2>Criar conta</h2>

          <p>Cadastre-se gratuitamente.</p>

          <div id="authMessage" class="alert" style="display: none"></div>

          <form id="formLogin">
            <div class="form-group">
              <label class="form-label"> Nome </label>

              <div class="input-icon">
                <i class="bi bi-person"></i>

                <input
                  id="nome"
                  class="form-control"
                  type="text"
                  placeholder="Seu nome"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"> Email </label>

              <div class="input-icon">
                <i class="bi bi-person"></i>

                <input
                  id="email"
                  class="form-control"
                  type="text"
                  placeholder="xxxxxx@email.com"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"> Senha </label>

              <div class="input-icon">
                <i class="bi bi-lock"></i>

                <input
                  id="senha"
                  class="form-control"
                  type="password"
                  placeholder="********"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"> Confrimar senha </label>

              <div class="input-icon">
                <i class="bi bi-person"></i>

                <input
                  id="confirmarSenha"
                  class="form-control"
                  type="text"
                  placeholder="********"
                />
              </div>
            </div>

            <button class="btn btn-primary auth-btn" type="submit">
              Criar conta
            </button>
          </form>
          <div class="auth-link">
            <a href="login.html"> Ir para Login </a>
          </div>
        </div>
      </div>
    </div>
  </body>

  <script src="js/utils.js"></script>
  <script src="js/services/api.js"></script>
  <script src="js/services/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/services/login.js"></script>
</html>
