<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Cadastro | Cofrinho Digital</title>
  <link rel="shortcut icon" href="Meu-Controle-Financeiro/Front-End/assets/vault.ico" type="image/x-icon" />

  <link rel="stylesheet" href="Meu-Controle-Financeiro/Front-End/css/global.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="css/cadastro.css" />
</head>

<body>
  <div class="login-page">
    <div class="container h-100 d-flex align-items-center justify-content-center">
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6">
          <div class="login-card">
            <div class="text-center mb-4">
              <div class="login-icon">
                <i class="fa fa-user-plus"></i>
              </div>
              <h2 class="login-title">Criar conta</h2>
              <p class="login-subtitle">Cadastre-se para começar a organizar suas finanças.</p>
            </div>

            <form id="cadastroForm" novalidate>
              <div class="form-group">
                <label for="nome">Nome completo</label>
                <input id="nome" type="text" class="form-control" placeholder="Seu nome" required />
              </div>

              <div class="form-group">
                <label for="email">E-mail</label>
                <input id="email" type="email" class="form-control" placeholder="seu@email.com" required />
              </div>

              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="senha">Senha</label>
                  <input id="senha" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <div class="form-group col-md-6">
                  <label for="confirmarSenha">Confirmar senha</label>
                  <input id="confirmarSenha" type="password" class="form-control" placeholder="••••••••" required />
                </div>
              </div>
              <button type="submit" class="btn btn-login btn-block">Cadastrar</button>
            </form>

            <div class="login-links">
              <a href="login.html">Já tenho conta</a>
              <a href="index.html">Voltar ao início</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  html

  <script>
    document.getElementById('cadastroForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const nomeInput = document.getElementById('nome');
      const emailInput = document.getElementById('email');
      const senhaInput = document.getElementById('senha');
      const confirmarSenhaInput = document.getElementById('confirmarSenha');

      if (senhaInput.value !== confirmarSenhaInput.value) {
        alert('As senhas não coincidem!');
        return;
      }

      const dadosUsuario = {
        nome: nomeInput.value,
        email: emailInput.value,
        senha: senhaInput.value
      };

      try {
        const resposta = await fetch('http://localhost:8000/auth/registro', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(dadosUsuario)
        });


        console.log(resposta)
        // 1. CORREÇÃO DO ERRO DE DIGITAÇÃO: Mudou de reply.json() para resposta.json()
        const resultado = await resposta.json();
        console.log(resultado)

        if (resposta.status == 201) {
          alert(`Usuário cadastrado com sucesso! ID do usuário: ${resultado.id}`);
          window.location.href = 'login.html';
        } else {
          // 2. AJUDA A IDENTIFICAR O ERRO 400: Mostra o que o backend rejeitou
          console.error('Detalhes do erro 400:', resultado);
          alert('Erro ao cadastrar usuário. Verifique se os dados estão no formato correto.');
        }

      } catch (erro) {
        console.error('Erro na conexão:', erro);
        alert('Não foi possível conectar ao servidor.');
      }
    });
  </script>
</body>

</html>
