<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cofrinho Digital</title>
  <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
</head>

<body>
  <div class="wrapper d-flex align-items-stretch">
    <!-- SIDEBAR -->
    <nav id="sidebar">
      <div class="custom-menu">
        <button type="button" id="sidebarCollapse" class="btn btn-primary">
          <i class="fa fa-bars" style="color: white"></i>
        </button>
      </div>

      <h1>
        <a href="index.html" class="logo" style="padding: 30px; font-size: 24px">
          Cofrinho Digital
        </a>
      </h1>

      <ul class="list-unstyled components">
        <li>
          <a href="index.html">
            <span class="fa fa-home mr-3"></span>
            Início
          </a>
        </li>

        <li>
          <a href="movimentacao.html">
              <span class="fa fa-plus-circle mr-3"></span>
              Movimentação
          </a>
        </li>

        <li>
          <a href="extrato.html">
            <span class="fa fa-file-text mr-3"></span>
            Extrato
          </a>
        </li>

        <li class="active">
          <a href="conversor.html" style="font-weight: bold;">
            <span class="fa fa-dollar mr-3"></span>
            Conversor
          </a>
        </li>
      </ul>

      <div style="
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
          ">
        <a href="https://github.com/Xhibata" target="_blank" style="color: white; text-decoration: none">
          <i class="fa fa-github mr-2"></i>
          Desenvolvido por @Xhibata
        </a>
      </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="content">
      <main class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div id="userName" class="font-weight-bold"></div>
          <button class="btn btn-outline-danger btn-sm" onclick="Auth.logout()">Sair</button>
        </div>

        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow">
              <div class="card-body">
                <h2 class="mb-4 text-center">Conversor de Moeda</h2>

                <form id="conversor-form">
                  <div class="form-group">
                    <label for="valor"> Valor </label>

                    <input type="number" class="form-control" id="valor" min="0" step="0.01" required />
                  </div>

                  <div class="form-group">
                    <label for="moedaOrigem"> Moeda de origem </label>

                    <select class="form-control" id="moedaOrigem" required>
                      <option value="">Selecione a moeda</option>
                      <option value="USD">Dólar (USD)</option>
                      <option value="EUR">Euro (EUR)</option>
                      <option value="BRL">Real (BRL)</option>
                    </select>
                  </div>

                  <div class="form-group">
                    <label for="moedaDestino"> Moeda de destino </label>

                    <select class="form-control" id="moedaDestino" required>
                      <option value="">Selecione a moeda</option>
                      <option value="USD">Dólar (USD)</option>
                      <option value="EUR">Euro (EUR)</option>
                      <option value="BRL">Real (BRL)</option>
                    </select>
                  </div>

                  <button type="submit" class="btn btn-primary btn-block">
                    Converter
                  </button>
                </form>

                <div id="resultado">
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/services/auth.js"></script>
  <script src="js/pages/conversor.js"></script>
  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
