<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moeda</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="index.html">Cofrinho Digital</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsExampleDefault">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarsExampleDefault">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="conversor.html">Conversão De Moeda</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="extrato.html">Extrato</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="criardespesas.html">Criar Despesa</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="containerConversorMoedas" style="margin-top:80px;">
        <main role="main" class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="card p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
                <form id="conversor-form">
                    <div class="form-group">
                        <label for="valor">Valor</label>
                        <input type="number" class="form-control" id="valor" placeholder="Digite o valor" required />
                    </div>
                    <div class="form-group">
                        <label for="moedaOrigem">Moeda de origem</label>
                        <select class="form-control" id="moedaOrigem" required>
                            <option value="">Selecione a moeda</option>
                            <option value="USD">Dólar (USD)</option>
                            <option value="EUR">Euro (EUR)</option>
                            <option value="BRL">Real (BRL)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="moedaDestino">Moeda de destino</label>
                        <select class="form-control" id="moedaDestino" required>
                            <option value="">Selecione a moeda</option>
                            <option value="USD">Dólar (USD)</option>
                            <option value="EUR">Euro (EUR)</option>
                            <option value="BRL">Real (BRL)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-dark btn-block">Converter</button>
                </form>
                <div id="resultado" class="mt-3 text-center">POR ENQUANTO NÃO TEM NADA</div>
            </div>
        </main>
</body>
</div>

<h2 id="resultado"></h2>

<script src="js/conversor.js"></script>
</body>

</html>
