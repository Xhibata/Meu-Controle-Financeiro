<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cofrinho Digital</title>
    <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />

    <link rel="stylesheet" href="css/main.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- =====================================
      SIDEBAR
  ====================================== -->

    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="bi bi-wallet2"></i>

        Cofrinho Digital
      </div>

      <nav class="sidebar-menu">
        <a href="index.html" class="sidebar-link">
          <i class="bi bi-grid-1x2-fill"></i>
          Dashboard
        </a>

        <a href="movimentacao.html" class="sidebar-link">
          <i class="bi bi-plus-circle"></i>
          Movimentações
        </a>

        <a href="extrato.html" class="sidebar-link">
          <i class="bi bi-receipt"></i>
          Extrato
        </a>

        <a href="conversor.html" class="sidebar-link active">
          <i class="bi bi-currency-exchange"></i>
          Conversor
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">JD</div>

          <div>
            <strong id="userName">John Doe</strong>
            <small>Usuário</small>
          </div>
        </div>
      </div>
    </aside>

    <!-- =====================================
      CONTEÚDO
  ====================================== -->

    <div class="content">
      <header class="navbar">
        <div></div>

        <button class="btn btn-outline" onclick="Auth.logout()">
          <i class="bi bi-box-arrow-right"></i>
          Sair
        </button>
      </header>

      <main class="main">
        <div class="page-header text-center">
          <h1>Conversor de moedas</h1>

          <p>Converta valores entre Real, Dólar e Euro.</p>
        </div>

        <div class="row justify-content-center mt-4">
          <div class="col-lg-7">
            <div class="card">
              <form id="conversor-form">
                <div class="form-group">
                  <label>Valor</label>

                  <div class="input-group">
                    <div class="input-group-text">R$</div>

                    <input
                      type="number"
                      id="valor"
                      class="form-control"
                      min="0"
                      step="0.01"
                      placeholder="0,00"
                      required
                    />
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group">
                      <label>Moeda de origem</label>

                      <select id="moedaOrigem" class="form-control" required>
                        <option value="">Selecione...</option>

                        <option value="BRL">Real (BRL)</option>
                        <option value="USD">Dólar (USD)</option>
                        <option value="EUR">Euro (EUR)</option>
                      </select>
                    </div>
                  </div>

                  <div class="col-md-6">
                    <div class="form-group">
                      <label>Moeda de destino</label>

                      <select id="moedaDestino" class="form-control" required>
                        <option value="">Selecione...</option>

                        <option value="BRL">Real (BRL)</option>
                        <option value="USD">Dólar (USD)</option>
                        <option value="EUR">Euro (EUR)</option>
                      </select>
                    </div>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary float-right">
                  <i class="bi bi-arrow-repeat"></i>

                  Converter
                </button>
              </form>
            </div>

            <div id="resultado" class="card mt-4" style="display: none"></div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/main.js"></script>
    <script src="js/pages/conversor.js"></script>

    <script>
      const usuario = Auth.getUsuario();

      if (usuario) {
        document.getElementById("userName").textContent = usuario.nome;
      }

      document.getElementById("userName").innerText = `Olá, ${usuario.nome}`;
    </script>
  </body>
</html>
