<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Conversor de Moeda</title>

    <link rel="stylesheet" href="css/global.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
      <a class="navbar-brand" href="index.html"> Cofrinho Digital </a>

      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbar">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item active">
            <a class="nav-link" href="conversor.html"> Conversão De Moeda </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="extrato.html"> Extrato </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="criardespesas.html"> Criar Despesa </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-body">
              <h2 class="mb-4 text-center">Conversor de Moeda</h2>

              <form id="conversor-form">
                <div class="form-group">
                  <label for="valor"> Valor </label>

                  <input
                    type="number"
                    class="form-control"
                    id="valor"
                    placeholder="Digite o valor"
                    required
                  />
                </div>

                <div class="form-group">
                  <label for="moedaOrigem"> Moeda de origem </label>

                  <select class="form-control" id="moedaOrigem" required>
                    <option value="">Selecione a moeda</option>

                    <option value="USD">Dólar (USD)</option>

                    <option value="EUR">Euro (EUR)</option>

                    <option value="BRL">Real (BRL)</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="moedaDestino"> Moeda de destino </label>

                  <select class="form-control" id="moedaDestino" required>
                    <option value="">Selecione a moeda</option>

                    <option value="USD">Dólar (USD)</option>

                    <option value="EUR">Euro (EUR)</option>

                    <option value="BRL">Real (BRL)</option>
                  </select>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                  Converter
                </button>
              </form>

              <div id="resultado" class="alert alert-info mt-4 text-center">
                Nenhuma conversão realizada.
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/conversor.js"></script>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  </body>
</html>
