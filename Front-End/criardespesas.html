<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Criar Despesa</title>

    <link rel="stylesheet" href="css/global.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
    />
  </head>

  <body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
      <a class="navbar-brand" href="index.html"> Cofrinho Digital </a>

      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbar">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="conversor.html"> Conversão De Moeda </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="extrato.html"> Extrato </a>
          </li>

          <li class="nav-item active">
            <a class="nav-link" href="criardespesas.html"> Criar Despesa </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-body">
              <h2 class="mb-4">Nova Despesa</h2>

              <form onsubmit="criarDespesa(event)">
                <div class="form-group">
                  <label for="nome"> Nome da despesa </label>

                  <input
                    type="text"
                    id="nome"
                    class="form-control"
                    placeholder="Digite o nome da despesa"
                    required
                  />
                </div>

                <div class="form-group">
                  <label for="valor"> Valor </label>

                  <div class="input-group">
                    <div class="input-group-prepend">
                      <span class="input-group-text"> R$ </span>
                    </div>

                    <input
                      type="number"
                      id="valor"
                      class="form-control"
                      step="0.01"
                      placeholder="0.00"
                      required
                    />
                  </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                  Criar Despesa
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script>
      function criarDespesa(event) {
        event.preventDefault();

        const nome = document.getElementById("nome").value;

        const valor = parseFloat(document.getElementById("valor").value);

        if (!nome || isNaN(valor)) {
          alert("Erro: Preencha todos os campos corretamente.");

          return;
        }

        const despesa = {
          nome: nome,
          valor: valor,
        };

        let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

        despesas.push(despesa);

        localStorage.setItem("despesas", JSON.stringify(despesas));

        document.getElementById("nome").value = "";

        document.getElementById("valor").value = "";

        window.location.href = "extrato.html";
      }
    </script>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  </body>
</html>
