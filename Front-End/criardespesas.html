<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Criar Despesa</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="index.html">Cofrinho Digital</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarsExampleDefault">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarsExampleDefault">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="conversor.html">Conversão De Moeda</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="extrato.html">Extrato</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="criardespesas.html">Criar Despesa</a>
                </li>
            </ul>
        </div>
    </nav>
    <h2 style="color: white;">Nova Despesa</h2>

    <form onsubmit="criarDespesa(event)">

        <label style="color: white;">Nome da despesa:</label><br>
        <input type="text" id="nome" required>
        <br><br>

        <label style="color: white;">Valor:</label><br>
        <span style="color: white;">R$</span>
        <input type="number" id="valor" step="0.01" required>
        <br><br>

        <button type="submit">Criar</button>

    </form>

    <br>
    <script>
        function criarDespesa(event) {
            event.preventDefault();

            const nome = document.getElementById("nome").value;
            const valor = parseFloat(document.getElementById("valor").value);

            if (!nome || isNaN(valor)) {
                alert("Erro: Preencha todos os campos corretamente.");
                return;
            }

            const despesa = {
                nome: nome,
                valor: valor
            };

            let despesas = JSON.parse(localStorage.getItem("despesas")) || [];

            despesas.push(despesa);

            localStorage.setItem("despesas", JSON.stringify(despesas));
            document.getElementById("nome").value = "";
            document.getElementById("valor").value = "";
            window.location.href = "extrato.html";
        }
    </script>

</body>

</html>
