<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Extrato | Cofrinho Digital</title>

    <link rel="shortcut icon" href="assets/vault.ico" />

    <link rel="stylesheet" href="css/main.css" />

    <link rel="stylesheet" href="css/extrato.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">Cofrinho Digital</div>

      <nav class="sidebar-menu">
        <a href="index.html" class="sidebar-link">
          <i class="bi bi-grid-1x2-fill"></i>

          Dashboard
        </a>

        <a href="movimentacao.html" class="sidebar-link">
          <i class="bi bi-plus-circle"></i>

          Movimentações
        </a>

        <a href="extrato.html" class="sidebar-link active">
          <i class="bi bi-receipt"></i>

          Extrato
        </a>

        <a href="conversor.html" class="sidebar-link">
          <i class="bi bi-currency-exchange"></i>

          Conversor
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">JO</div>

          <div>
            <strong id="userName"> John Doe </strong>

            <small> Usuário </small>
          </div>
        </div>
      </div>
    </aside>

    <div class="content">
      <header class="navbar">
        <div></div>

        <button class="btn btn-outline" onclick="Auth.logout()">
          <i class="bi bi-box-arrow-right"></i>

          Sair
        </button>
      </header>

      <main class="main">
        <div class="page-header">
          <h1>
            Extrato <br />
            <small>Receitas e despesas registradas.</small>
          </h1>
        </div>

        <div class="card">
          <div class="extrato-header">
            <div></div>

            <button class="btn btn-danger" onclick="limparExtrato()">
              <i class="bi bi-trash"></i>

              Limpar Extrato
            </button>
          </div>

          <div class="table-wrapper">
            <table class="extrato-table">
              <thead>
                <tr>
                  <th>Tipo</th>

                  <th>Descrição</th>

                  <th>Valor</th>

                  <th>Data</th>

                  <th width="125">Ações</th>
                </tr>
              </thead>

              <tbody id="tabelaExtratos"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/extratoService.js"></script>
    <script src="js/main.js"></script>
    <script src="js/pages/extrato.js"></script>

    <script>
      const usuario = Utils.recuperar(STORAGE.USUARIO);

      if (usuario) {
        document.getElementById("userName").textContent = usuario.nome;
      }
    </script>
  </body>
</html>
