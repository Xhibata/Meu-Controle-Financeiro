  <script>
const API_URL = "http://localhost:8000/extrato";

const lista = document.getElementById("lista");
const saldoAtual = document.getElementById("saldoAtual");
const saldo = document.getElementById("saldo");

// Carrega o extrato quando a página abrir
window.onload = () => {
    listarReceitas();
};

// ==========================
// LISTAR
// ==========================
async function listarReceitas() {
    try {
        const response = await fetch(API_URL);

        if (!response.ok) {
            throw new Error("Erro ao buscar extrato.");
        }

        const dados = await response.json();

        lista.innerHTML = "";

        let totalReceitas = 0;
        let totalDespesas = 0;

        dados.forEach(item => {

            const li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";

            li.innerHTML = `
                <div>
                    <strong>${item.descricao}</strong><br>
                    <small>${item.tipo}</small>
                </div>

                <div>
                    <strong>R$ ${Number(item.valor).toFixed(2)}</strong>

                    <button class="btn btn-warning btn-sm ml-2"
                        onclick="buscarReceita(${item.id})">
                        Editar
                    </button>

                    <button class="btn btn-danger btn-sm ml-2"
                        onclick="excluirReceita(${item.id})">
                        Excluir
                    </button>
                </div>
            `;

            lista.appendChild(li);

            if (item.tipo === "Receita") {
                totalReceitas += Number(item.valor);
            } else {
                totalDespesas += Number(item.valor);
            }

        });

        saldoAtual.innerHTML =
            `Saldo Atual R$ ${(totalReceitas - totalDespesas).toFixed(2)}`;

        saldo.innerHTML =
            `Total gasto R$ ${totalDespesas.toFixed(2)}`;

    } catch (erro) {
        console.error(erro);
    }
}

// ==========================
// BUSCAR
// ==========================
async function buscarReceita(id) {

    try {

        const response = await fetch(`${API_URL}/${id}`);

        const receita = await response.json();

        console.log(receita);

        alert(
            `Descrição: ${receita.descricao}
Valor: ${receita.valor}
Tipo: ${receita.tipo}`
        );

    } catch (erro) {

        console.error(erro);

    }

}

// ==========================
// CADASTRAR
// ==========================
async function cadastrarReceita(descricao, valor) {

    try {

        const receita = {
            descricao,
            valor,
            tipo: "Receita"
        };

        await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(receita)

        });

        listarReceitas();

    } catch (erro) {

        console.error(erro);

    }

}

// Exemplo:
// cadastrarReceita("Salário",5000);

// ==========================
// EDITAR
// ==========================
async function editarReceita(id, descricao, valor) {

    try {

        const receita = {
            descricao,
            valor,
            tipo: "Receita"
        };

        await fetch(`${API_URL}/${id}`, {

            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(receita)

        });

        listarReceitas();

    } catch (erro) {

        console.error(erro);

    }

}

// Exemplo:
// editarReceita(1,"Salário Atualizado",6000);

// ==========================
// EXCLUIR
// ==========================
async function excluirReceita(id) {

    if (!confirm("Deseja excluir este registro?"))
        return;

    try {

        await fetch(`${API_URL}/${id}`, {

            method: "DELETE"

        });

        listarReceitas();

    } catch (erro) {

        console.error(erro);

    }

}
</script>
