<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cofrinho Digital</title>
  <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <style>
    #content {
      width: 100%;
      min-height: 100vh;
    }

    main.container {
      max-width: 960px;
      padding: 1rem 1rem 2rem;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .summary-grid > div {
      padding: 0.9rem;
      border: 1px solid #e9ecef;
      border-radius: 0.5rem;
      background: #f8f9fa;
    }

    .item-info {
      min-width: 0;
      flex: 1 1 220px;
    }

    .item-actions {
      margin-left: auto;
    }

    @media (max-width: 768px) {
      main.container {
        padding: 0.75rem 0.75rem 1.5rem;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .item-actions {
        width: 100%;
        justify-content: flex-end;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <div class="wrapper d-flex align-items-stretch">
    <!-- SIDEBAR -->
    <nav id="sidebar">
      <div class="custom-menu">
        <button type="button" id="sidebarCollapse" class="btn btn-primary">
          <i class="fa fa-bars" style="color: white"></i>
        </button>
      </div>

      <h1>
        <a href="index.html" class="logo" style="padding: 30px; font-size: 24px">
          Cofrinho Digital
        </a>
      </h1>

      <ul class="list-unstyled components">
        <li>
          <a href="index.html" style="font-weight: bold;">
            <span class="fa fa-home mr-3"></span>
            Início
          </a>
        </li>

        <li>
          <a href="criardespesas.html" style="font-weight: bold;">
            <span class="fa fa-plus mr-3"></span>
            Criar Despesa
          </a>
        </li>

        <li class="active">
          <a href="extrato.html" style="font-weight: bold;">
            <span class="fa fa-file-text mr-3"></span>
            Extrato
          </a>
        </li>

        <li>
          <a href="conversor.html" style="font-weight: bold;">
            <span class="fa fa-dollar mr-3"></span>
            Conversor
          </a>
        </li>
      </ul>

      <div style="
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
          ">
        <a href="https://github.com/Xhibata" target="_blank" style="color: white; text-decoration: none">
          <i class="fa fa-github mr-2"></i>
          Desenvolvido por @Xhibata
        </a>
      </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="content">
      <main class="container mt-5">
        <div class="top-bar">
          <div id="userName" class="font-weight-bold"></div>
          <button id="logoutButton" class="btn btn-outline-danger btn-sm" type="button">Sair</button>
        </div>

        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8">
            <div class="card shadow">
              <div class="card-body">
                <h2 class="mb-4 text-center">Extrato</h2>

                <div class="summary-grid mb-4">
                  <div class="text-center">
                    <h5 class="mb-2">Saldo atual</h5>
                    <h4 id="saldoAtual" class="mb-0 text-success">R$ 0,00</h4>
                  </div>
                  <div class="text-center">
                    <h5 class="mb-2">Total gasto</h5>
                    <h4 id="saldo" class="mb-0 text-danger">R$ 0,00</h4>
                  </div>
                </div>

                <div id="emptyState" class="alert alert-info mb-3 d-none">Nenhum lançamento encontrado.</div>
                <ul id="lista" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/extrato.js"></script>
  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
