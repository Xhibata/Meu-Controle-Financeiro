<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Extrato</title>

  <link rel="stylesheet" href="css/global.css" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
</head>

<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="index.html"> Cofrinho Digital </a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbar">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item">
          <a class="nav-link" href="conversor.html"> Conversão De Moeda </a>
        </li>

        <li class="nav-item active">
          <a class="nav-link" href="extrato.html"> Extrato </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="criardespesas.html"> Criar Despesa </a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div class="card-body">
            <h2 class="mb-4">Extrato</h2>

            <h4 id="saldoAtual" class="mb-4 text-success">
              Saldo Atual: R$ 0,00
            </h4>

            <h4 id="saldo" class="mb-4 text-danger">
              Total gasto: R$ 0,00
            </h4>

            <ul id="lista" class="list-group"></ul>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function carregarExtrato() {
      const lista = document.getElementById("lista");

      const totalEl = document.getElementById("saldo");

      const saldoAtualEl = document.getElementById("saldoAtual");

      lista.innerHTML = "";

      // Recupera despesas
      const despesas = JSON.parse(localStorage.getItem("despesas")) || [];

      // Recupera saldo adicionado
      const saldoAdicionado =
        parseFloat(localStorage.getItem("saldoAdicionado")) || 0;

      let total = 0;

      despesas.forEach((d) => {
        const item = document.createElement("li");

        item.classList.add(
          "list-group-item",
          "d-flex",
          "justify-content-between",
          "align-items-center"
        );

        item.innerHTML = `
      <span>${d.nome}</span>

      <span class="badge badge-danger badge-pill">
        R$ ${d.valor.toFixed(2)}
      </span>
     `;

        lista.appendChild(item);

        total += d.valor;
      });

      totalEl.textContent =
        "Total gasto: R$ " + total.toFixed(2);

      const saldoFinal = saldoAdicionado - total;

      saldoAtualEl.textContent =
        "Saldo Atual: R$ " + saldoFinal.toFixed(2);

      if (saldoFinal > 0) {
        saldoAtualEl.classList.remove("text-danger");
        saldoAtualEl.classList.add("text-success");

      } else if (saldoFinal < 0) {
        saldoAtualEl.classList.remove("text-success");
        saldoAtualEl.classList.add("text-danger");

      } else {
        saldoAtualEl.classList.remove("text-success");
        saldoAtualEl.classList.remove("text-danger");
        saldoAtualEl.classList.add("text-warning");
      }
    }
    carregarExtrato();

    window.addEventListener("storage", carregarExtrato);
  </script>
  <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</body>

</html>
