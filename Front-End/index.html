<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <title>Cofrinho Digital</title>
  <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/popup.css" />
</head>

<body>
  <div class="wrapper d-flex align-items-stretch">
    <nav id="sidebar">
      <div class="custom-menu">
        <button type="button" id="sidebarCollapse" class="btn btn-primary">
          <i class="fa fa-bars" style="color: white"></i>
        </button>
      </div>

      <h1>
        <a href="index.html" class="logo" style="padding: 30px; font-size: 24px">
          Cofrinho Digital
        </a>
      </h1>

      <ul class="list-unstyled components">
        <li class="active">
          <a href="index.html" style="font-weight: bold;">
            <span class="fa fa-home mr-3"></span>
            Início
          </a>
        </li>

        <li>
          <a href="criardespesas.html" style="font-weight: bold;">
            <span class="fa fa-plus mr-3"></span>
            Criar Despesa
          </a>
        </li>

        <li>
          <a href="extrato.html" style="font-weight: bold;">
            <span class="fa fa-file-text mr-3"></span>
            Extrato
          </a>
        </li>

        <li>
          <a href="conversor.html" style="font-weight: bold;">
            <span class="fa fa-dollar mr-3"></span>
            Conversor
          </a>
        </li>
      </ul>

      <div style="
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
          ">
        <a href="https://github.com/Xhibata" target="_blank" style="color: white; text-decoration: none;">
          <i class="fa fa-github mr-2"></i>
          Desenvolvido por @Xhibata
        </a>
      </div>
    </nav>

    <div id="content">
      <main role="main" class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div id="userName" class="font-weight-bold"></div>
          <button class="btn btn-outline-danger btn-sm" onclick="logout()">Sair</button>
        </div>

        <div class="row justify-content-center mt-5">
          <div class="col-12 mb-3">
            <div class="card">
              <div class="card-body">
                <h4 class="text-center">Saldo Atual</h4>
                <h2 id="saldo" class="text-center">R$ 0,00</h2>
              </div>

              <a class="btn btn-outline-secondary m-2" href="login.html">
                Ir para Login
              </a>
            </div>
          </div>
        </div>



          <div class="col-12 mt-3">
            <div class="card">
              <div class="card-body">
                <h4 class="text-center">Resumo Financeiro</h4>

                <div class="row text-center">
                  <div class="col-md-3 col-6 mb-3">
                    <div class="p-3 border rounded">
                      <div class="small">Total de Receitas</div>
                      <div id="totalReceitas" class="font-weight-bold">R$ 0,00</div>
                    </div>
                  </div>

                  <div class="col-md-3 col-6 mb-3">
                    <div class="p-3 border rounded">
                      <div class="small">Total de Despesas</div>
                      <div id="totalDespesas" class="font-weight-bold">R$ 0,00</div>
                    </div>
                  </div>

                  <div class="col-md-3 col-6 mb-3">
                    <div class="p-3 border rounded">
                      <div class="small">Quantidade Receitas</div>
                      <div id="qtdReceitas" class="font-weight-bold">0</div>
                    </div>
                  </div>

                  <div class="col-md-3 col-6 mb-3">
                    <div class="p-3 border rounded">
                      <div class="small">Quantidade Despesas</div>
                      <div id="qtdDespesas" class="font-weight-bold">0</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 mt-3">
            <div class="card">
              <div class="card-body">
                <h4 class="text-center">Transações Recentes</h4>

                <ul id="recentes" class="list-group"></ul>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <div class="modal fade" id="modalSaldo" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content popup-saldo">

        <div class="modal-header">
          <h5 class="modal-title">Adicionar Saldo</h5>

          <button type="button" class="close" data-dismiss="modal">
            <span>&times;</span>
          </button>
        </div>

        <div class="modal-body">
          <input type="number" id="valorSaldo" class="form-control input-saldo" placeholder="Digite o valor">
        </div>

        <div class="modal-footer">
          <button class="btn-confirmar" onclick="adicionarSaldo()">
            Confirmar
          </button>

          <button class="btn-fechar" data-dismiss="modal">
            Fechar
          </button>
        </div>

      </div>
    </div>
  </div>


  <script src="js/index.js"></script>
  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
