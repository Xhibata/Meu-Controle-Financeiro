<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Login | Cofrinho Digital</title>
    <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <div class="login-page">
      <div class="container h-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
          <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <div class="login-card">
              <div class="text-center mb-4">
                <div class="login-icon">
                  <i class="fa fa-lock"></i>
                </div>
                <h2 class="login-title">Cofrinho Digital</h2>
                <p class="login-subtitle">Entre para continuar gerenciando suas finanças.</p>
              </div>

              <form id="loginForm" novalidate>
                <div class="form-group">
                  <label for="email">E-mail</label>
                  <input id="email" type="email" class="form-control" placeholder="seu@email.com" required />
                </div>

                <div class="form-group">
                  <label for="senha">Senha</label>
                  <input id="senha" type="password" class="form-control" placeholder="••••••••" required />
                </div>

                <button type="submit" class="btn btn-login btn-block">Entrar</button>
              </form>

              <div class="login-links">
                <a href="index.html">Voltar ao início</a>
                <a href="#">Esqueci a senha</a>
              </div>

              <div class="text-center mt-3">
                <a href="cadastro.html" class="btn btn-outline-secondary btn-sm">Criar conta</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
