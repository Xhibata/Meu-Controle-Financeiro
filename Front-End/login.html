<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Cofrinho Digital</title>
  <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>

<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="card shadow">
          <div class="card-body">
            <h2 class="text-center mb-4">Bem-vindo ao Cofrinho Digital</h2>
            <p class="text-center text-muted mb-4">Faça login ou cadastre-se para acessar seu saldo, extrato e despesas.</p>

            <div id="authMessage" class="alert" style="display: none;"></div>

            <div class="row">
              <div class="col-md-6 mb-4">
                <h4>Entrar</h4>
                <form id="login-form">
                  <div class="form-group">
                    <label for="loginUsername">Email</label>
                    <input id="loginUsername" class="form-control" type="text" placeholder="exemplo@email.com" required />
                  </div>
                  <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <input id="loginPassword" class="form-control" type="password" placeholder="Sua senha" required />
                  </div>
                  <div class="form-group form-check">
                    <input id="loginRemember" class="form-check-input" type="checkbox" />
                    <label class="form-check-label" for="loginRemember">Continuar conectado</label>
                  </div>
                  <button class="btn btn-primary btn-block" type="submit">Entrar</button>
                  <button class="btn btn-secondary btn-block" type="button" onclick="window.location.href='cadastro.html'">Cadastrar</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
document.getElementById("login-form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = document.getElementById("loginUsername").value;
    const senha = document.getElementById("loginPassword").value;

    try {
        const resposta = await fetch("http://localhost:8000/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                senha: senha
            })
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
            throw new Error(dados.detail || "Email ou senha inválidos.");
        }
        

        // Salva o token
        localStorage.setItem("access_token", dados.access_token);
        localStorage.setItem("token_type", dados.token_type);

        // Se quiser salvar o email também
        localStorage.setItem("usuario_email", email);

 

        // Redireciona para a página principal
        window.location.href = "index.html";
    } catch (erro) {
        alert(erro.message);
    }
});
</script>

</body>

</html>
