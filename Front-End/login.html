<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Cofrinho Digital</title>
  <link rel="shortcut icon" href="assets/vault.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>

<body>
  <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="row justify-content-center w-100">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">

        <div class="card shadow p-3">
          <div class="card-body">
            <h2 class="text-center mb-4 font-weight-bold">Bem-vindo ao Cofrinho Digital</h2>
            <p class="text-center text-muted mb-4">Faça login ou cadastre-se para acessar seu saldo, extrato e despesas.</p>

            <div id="authMessage" class="alert" style="display: none;"></div>

            <form id="formLogin">
              <div class="form-group">
                <label for="email">Email</label>
                <input id="email" class="form-control" type="email" placeholder="exemplo@email.com" required />
              </div>

              <div class="form-group">
                <label for="senha">Senha</label>
                <input id="senha" class="form-control" type="password" placeholder="Sua senha" required />
              </div>

              <div class="form-group form-check my-3">
                <input id="loginRemember" class="form-check-input" type="checkbox" />
                <label class="form-check-label" for="loginRemember">Continuar conectado</label>
              </div>

              <button class="btn btn-primary btn-block mb-2" type="submit">Entrar</button>
              <button class="btn btn-outline-secondary btn-block" type="button" onclick="window.location.href='cadastro.html'">Cadastrar</button>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
</body>
<script src="js/utils.js"></script>
<script src="js/services/api.js"></script>
<script src="js/services/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/services/login.js"></script>
</html>
