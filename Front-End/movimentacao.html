<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nova Movimentação | Cofrinho Digital</title>

    <link rel="shortcut icon" href="assets/vault.ico" />

    <link rel="stylesheet" href="css/main.css" />

    <link rel="stylesheet" href="css/dashboard.css" />

    <link rel="stylesheet" href="css/movimentacao.css" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- =======================
        SIDEBAR
    ======================== -->

    <aside class="sidebar">
      <div class="sidebar-logo">
        <i class="bi bi-wallet2"></i>

        Cofrinho Digital
      </div>

      <nav class="sidebar-menu">
        <a href="index.html" class="sidebar-link">
          <i class="bi bi-grid-1x2-fill"></i>

          Dashboard
        </a>

        <a href="movimentacao.html" class="sidebar-link active">
          <i class="bi bi-plus-circle"></i>

          Movimentações
        </a>

        <a href="extrato.html" class="sidebar-link">
          <i class="bi bi-receipt"></i>

          Extrato
        </a>

        <a href="conversor.html" class="sidebar-link">
          <i class="bi bi-currency-exchange"></i>

          Conversor
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-avatar">JD</div>

          <div>
            <strong id="userName"> John Doe </strong>

            <small> Usuário </small>
          </div>
        </div>
      </div>
    </aside>

    <!-- =======================
        CONTEÚDO
    ======================== -->

    <div class="content">
      <!-- NAVBAR -->

      <header class="navbar">
        <div></div>

        <button class="btn btn-outline" onclick="Auth.logout()">
          <i class="bi bi-box-arrow-right"></i>

          Sair
        </button>
      </header>

      <!-- MAIN -->

      <main class="main">
        <div class="page-header">
          <h1>Nova movimentação</h1>

          <p>Cadastre uma nova receita ou despesa.</p>
        </div>

        <div class="card movement-card">
          <form id="formMovimentacao">
            <!-- Tipo -->

            <div class="form-group">
              <label class="form-label"> Tipo da movimentação </label>

              <select id="tipo" class="form-control" required>
                <option value="">Selecione...</option>

                <option value="E">Receita</option>

                <option value="S">Despesa</option>
              </select>
            </div>

            <!-- Descrição -->

            <div class="form-group">
              <label class="form-label"> Descrição </label>

              <input
                id="descricao"
                class="form-control"
                type="text"
                placeholder="Ex.: Salário, Mercado, Internet..."
                required
              />
            </div>

            <!-- Linha -->

            <div class="movement-grid">
              <div class="form-group">
                <label class="form-label"> Valor </label>

                <input
                  id="valor"
                  class="form-control"
                  type="number"
                  step="0.01"
                  min="0"
                  placeholder="0,00"
                  required
                />
              </div>

              <div class="form-group">
                <label class="form-label"> Data </label>

                <input id="data" class="form-control" type="date" />
              </div>
            </div>

            <div class="movement-actions">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-check-circle-fill"></i>

                Salvar movimentação
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <!-- Popup existente (mantido para não quebrar o JS atual) -->

    <div id="popup" class="popup">
      <div class="popup-content">
        <h3>Movimentação criada com sucesso!</h3>

        <div class="botoes-popup">
          <button class="btn-extrato" onclick="irParaExtrato()">
            Ver Extrato
          </button>

          <button class="btn-fechar" onclick="fecharPopup()">Fechar</button>
        </div>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/services/auth.js"></script>
    <script src="js/services/extratoService.js"></script>
    <script src="js/main.js"></script>
    <script src="js/pages/movimentacao.js"></script>

    <script>
      const usuario = Utils.recuperar(STORAGE.USUARIO);

      if (usuario) {
        document.getElementById("userName").textContent = usuario.nome;
      }
    </script>
  </body>
</html>
